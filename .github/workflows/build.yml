name: Build Windows EXE

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --add-data "templates;templates" --add-data "static;static" --add-data "static/assets/images;static/assets/images" --hidden-import flask --hidden-import sqlite3 --hidden-import database --hidden-import services --hidden-import init_db --hidden-import cloudinary --hidden-import cloudinary.uploader app.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SchoolManagementSystem-Windows
          path: dist/app.exe
